id = "shell.powershell.safe"
name = "Run Safe PowerShell"
version = "0.1.0"
description = "Runs allowlisted PowerShell commands with safety checks."
category = "shell"
skill_type = "tool"
risk_level = "high"
permissions = ["shell_run"]
platforms = ["windows"]
entrypoint = "builtin:shell.powershell.safe"
author = "Axiom Agent"
license = "MIT"
min_axiom_version = "0.1.0"

[llm_card]
summary = "Use safe PowerShell command execution for terminal tasks on Windows."
when_to_use = ["User asks to run a command", "User asks to test or inspect via terminal"]
input_contract = "command, working_directory, safety_level"
output_contract = "exit_code, stdout, stderr"
token_budget = 260
