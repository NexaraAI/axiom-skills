id = "python.write"
name = "Python Code Writer"
version = "0.1.0"
description = "Guides the LLM to write clean Python code with safe structure."
category = "coding"
skill_type = "prompt"
risk_level = "low"
permissions = []
platforms = ["windows", "linux", "macos"]
entrypoint = "prompt-only"
author = "Axiom Agent"
license = "MIT"
min_axiom_version = "0.1.0"

[llm_card]
summary = "Use this when the user asks to write, explain, or modify Python code."
when_to_use = [
  "User asks for Python code",
  "User asks to debug a Python snippet",
  "User asks to create a Python script",
]
input_contract = "task, constraints, target_python_version"
output_contract = "code, explanation, safety_notes"
token_budget = 350
